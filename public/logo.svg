<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer Circle -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="url(#logoGradient)" stroke-width="2"/>
  
  <!-- Inner Design - Code Brackets -->
  <!-- Left Bracket -->
  <path d="M 35 40 L 30 40 L 30 60 L 35 80 L 40 80" stroke="url(#logoGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right Bracket -->
  <path d="M 85 40 L 90 40 L 90 60 L 85 80 L 80 80" stroke="url(#logoGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Center Code Lines -->
  <line x1="45" y1="50" x2="75" y2="50" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="60" x2="65" y2="60" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="70" x2="75" y2="70" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Text: RD in the center bottom -->
  <text x="60" y="100" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="url(#logoGradient)" text-anchor="middle" letter-spacing="1">RD</text>
</svg>